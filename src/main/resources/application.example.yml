server:
  port: 10000

spring:
  devtools:
    restart:
      exclude: "**/dto/**"

  servlet:
    multipart:
      location: "C:/upload"
      enabled: true
      max-request-size: 40MB
      max-file-size: 40MB
      file-size-threshold: 100MB

  data:
    redis:
      host: localhost
      port: 6379
      password: replace-with-redis-password
      timeout: 60000

  cache:
    type: redis

  datasource:
    hikari:
      driver-class-name: oracle.jdbc.OracleDriver
      jdbc-url: jdbc:oracle:thin:@//localhost:1521/XE
      username: replace-with-oracle-user
      password: replace-with-oracle-password

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
    cors:
      mappings:
        "/**":
          allowed-origins: "http://localhost:3000"
          allowed-methods: "*"
          allowed-headers: "*"
          allow-credentials: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: "replace-with-google-client-id"
            client-secret: "replace-with-google-client-secret"
            scope:
              - email
              - profile
            redirect-uri: "http://localhost:10000/login/oauth2/code/google"
            authorization-grant-type: authorization_code
            client-name: Google
            provider: google

          naver:
            client-id: "replace-with-naver-client-id"
            client-secret: "replace-with-naver-client-secret"
            scope:
              - name
              - email
            redirect-uri: "http://localhost:10000/login/oauth2/code/naver"
            authorization-grant-type: authorization_code
            client-name: Naver
            provider: naver

          kakao:
            client-id: "replace-with-kakao-client-id"
            scope:
              - profile_nickname
              - account_email
              - profile_image
            redirect-uri: "http://localhost:10000/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-name: Kakao
            provider: kakao

        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: name

          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret: "replace-with-local-jwt-secret"
  token-blacklist-prefix: "blacklist:"
  refresh-blacklist-prefix: "refresh:"

coolsms:
  api:
    key: "replace-with-coolsms-api-key"
    secret: "replace-with-coolsms-api-secret"

file:
  upload:
    path: "C:/upload/"

openai:
  api-key: "replace-with-openai-api-key"
  base-url: https://api.openai.com/v1
  model: gpt-4.1-mini
